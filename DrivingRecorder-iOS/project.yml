name: DrivingRecorder
options:
  bundleIdPrefix: com.drivingrecorder
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"

targets:
  DrivingRecorder:
    type: application
    platform: iOS
    sources:
      - path: DrivingRecorder
        type: group
    settings:
      base:
        INFOPLIST_FILE: DrivingRecorder/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.drivingrecorder.ios
        PRODUCT_NAME: 驾驶记录仪
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
    info:
      path: DrivingRecorder/Info.plist
